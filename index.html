<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memos</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="marquee" aria-label="Photo wall"></main>

    <button id="manageBtn" type="button">
      <span id="manageBtnIcon" class="btn-icon" aria-hidden="true">
        <svg class="icon icon-manage" viewBox="0 0 24 24" focusable="false">
          <path d="M4 6h16v3H4V6zm0 5h10v3H4v-3zm0 5h16v3H4v-3z"></path>
        </svg>
        <svg class="icon icon-upload hidden" viewBox="0 0 24 24" focusable="false">
          <path d="M5 19h14v2H5v-2zm7-16 5 5h-3v7h-4V8H7l5-5z"></path>
        </svg>
      </span>
      <span id="manageBtnLabel">Manage Photos</span>
    </button>

    <div id="pinModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="pinTitle">
      <div class="modal-content pin-content">
        <button id="closePinBtn" class="icon-close" type="button" aria-label="Close">&times;</button>
        <h2 id="pinTitle">Elies' Gallery</h2>
        <div class="manage-controls pin-controls">
          <input id="pinInput" type="password" inputmode="numeric" placeholder="Enter admin PIN" />
          <button id="unlockBtn" type="button">Sign in</button>
        </div>
        <p id="authHint"></p>
      </div>
    </div>

    <div id="uploadModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="uploadTitle">
      <div class="modal-content">
        <h2 id="uploadTitle">Upload Photos</h2>

        <label for="uploadInput">Add photo files (max 10)</label>
        <div class="manage-controls">
          <input id="uploadInput" type="file" accept="image/*" multiple />
          <button id="uploadBtn" type="button">Upload</button>
        </div>

        <div id="stagedFilesList" class="staged-files-list hidden"></div>

        <div id="manageList" class="manage-list"></div>
        <button id="closeUploadBtn" type="button">Close</button>
      </div>
    </div>

    <div id="uploadingModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="uploadingTitle">
      <div class="modal-content loading-content">
        <h2 id="uploadingTitle">Wait a bit elie..</h2>
        <div class="loading-spinner-container">
          <div class="loading-spinner"></div>
        </div>
        <p id="uploadingPercent" class="loading-percent">0%</p>
        <p id="uploadingHint" class="loading-hint">Preparing files...</p>
      </div>
    </div>

    <div id="successModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="successTitle">
      <div class="modal-content success-content">
        <div class="success-icon-container">
          <svg class="success-icon" viewBox="0 0 24 24">
            <path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"></path>
          </svg>
        </div>
        <h2 id="successTitle">Thanks Elie :P</h2>
        <p id="successHint">Upload successful. Refreshing...</p>
      </div>
    </div>

    <div id="previewModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="previewCaption">
      <div class="modal-content preview-content">
        <img id="previewImage" alt="Preview" />
        <p id="previewCaption" class="hidden"></p>
        <div class="preview-actions">
          <a id="downloadBtn" class="btn-download" href="#" download>
            <svg class="icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M5 20h14v2H5v-2zm7-18 5 5h-3v7h-4V7H7l5-5z"></path>
            </svg>
            Download
          </a>
          <button id="previewDeleteBtn" class="btn-danger" type="button">
            <svg class="icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M6 7h12l-1 14H7L6 7zm3-4h6l1 2h4v2H4V5h4l1-2z"></path>
            </svg>
            Delete
          </button>
          <button id="closePreviewBtn" type="button">
            <svg class="icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path>
            </svg>
            Go Back
          </button>
        </div>
      </div>
    </div>

    <template id="cardTemplate">
      <article class="card">
        <img class="photo" loading="lazy" alt="" />
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
